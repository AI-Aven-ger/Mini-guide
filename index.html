<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" href="AN.png" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1720;color:#e9edef;overflow:hidden;}
.app{display:flex;height:100vh;}
.sidebar{width:320px;background:#17212b;border-right:1px solid #222e3c;display:flex;flex-direction:column;transition:.3s;box-shadow:2px 0 5px rgba(0,0,0,0.5);}
.sidebar-header{padding:16px;font-weight:bold;font-size:18px;color:#6ab0f3;border-bottom:1px solid #222e3c;text-align:center;}
.chat-list{flex:1;overflow-y:auto;}
.chat-item{padding:15px;margin:5px;border-radius:10px;cursor:pointer;transition:.2s;position:relative;background:#1a2531;}
.chat-item:hover{background:#1f2c3a;}
.chat-item.active{background:#233040;border-left:4px solid #6ab0f3;}

.chat{flex:1;display:flex;flex-direction:column;background:#0e1621;position:relative;}
.chat-header{background:#17212b;padding:14px 20px;border-bottom:1px solid #222e3c;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5;}
.back-btn{display:none;cursor:pointer;font-size:18px;color:#6ab0f3;}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
.message{background:#1f2c3a;padding:14px 16px;border-radius:14px;max-width:80%;white-space:pre-wrap;animation:fadeIn .3s ease forwards;opacity:0;transform:translateY(10px);}
.message.code{background:#0e1621;border:1px solid #2a3b4c;font-family:monospace;}
.message a{color:#6ab0f3;text-decoration:none;}
.message a:hover{text-decoration:underline;}
@keyframes fadeIn{to{opacity:1;transform:translateY(0);}}
@media(max-width:768px){.sidebar{position:absolute;width:100%;height:100%;z-index:10;}.sidebar.hidden{transform:translateX(-100%);}.back-btn{display:block;}}
</style>
</head>
<body>
<div class="app">
<div class="sidebar" id="sidebar">
<div class="sidebar-header">📚 PRG</div>
<div class="chat-list">
<div class="chat-item" onclick="openChat(event,'python')">🐍 Python</div>
<div class="chat-item" onclick="openChat(event,'js')">🟨 JavaScript</div>
<div class="chat-item" onclick="openChat(event,'java')">☕ Java</div>
<div class="chat-item" onclick="openChat(event,'c')">⚙ C</div>
<div class="chat-item" onclick="openChat(event,'go')">🚀 Go</div>
</div>
</div>

<div class="chat">
<div class="chat-header">
<div class="back-btn" onclick="goBack()">⬅</div>
<div id="chat-title">Выберите язык</div>
</div>
<div class="messages" id="messages">
<div class="message">Выберите язык слева 👈</div>
</div>
</div>
</div>

<script>
const content = {

python:{
title:"🐍 Python",
messages:[
{text:"Python — высокоуровневый, интерпретируемый язык. Прост в синтаксисе, подходит новичкам. Используется в веб-разработке, AI, анализе данных и автоматизации. Поддерживает ООП, процедурное и функциональное программирование. Популярен благодаря большим библиотекам: NumPy, Pandas, TensorFlow, Flask, Django. Быстрое прототипирование проектов делает Python любимым инструментом студентов и профессионалов. Можно легко тестировать идеи и создавать скрипты для автоматизации задач."},

{code:true,value:"print('Hello, World!')"}, {text:"Вывод: Hello, World!"},

{code:true,value:"x=10\ny=5\nprint(x+y)"}, {text:"Вывод: 15 — сумма двух чисел"},

{code:true,value:"for i in range(3):\n print(i)"}, {text:"Вывод:\n0\n1\n2 — цикл for"},

{code:true,value:"def greet(name):\n return f'Hello {name}'\nprint(greet('Alex'))"}, {text:"Вывод: Hello Alex — функция с параметром"},

{code:true,value:"nums=[1,2,3]\nprint([n*2 for n in nums])"}, {text:"Вывод: [2,4,6] — list comprehension"},

{text:"Рекомендуемые книги и ресурсы:\n• <a href='https://pythonbook.ru/' target='_blank'>Python для начинающих</a>\n• <a href='https://automatetheboringstuff.com/' target='_blank'>Automate the Boring Stuff</a>\n• <a href='https://docs.python.org/3/tutorial/' target='_blank'>Официальный Python Tutorial</a>"}
]
},

js:{
title:"🟨 JavaScript",
messages:[
{text:"JavaScript — язык веб-разработки. Работает в браузере, делает сайты интерактивными. Используется на фронтенде и сервере (Node.js). Поддерживает функции первого класса, асинхронность через промисы и async/await. Фреймворки React, Vue, Angular создают современные интерфейсы. JS динамический и гибкий, подходит для игр, веб-приложений и мобильных приложений. Обучение JavaScript даёт базу для фронтенда и бекенда одновременно."},

{code:true,value:"console.log('Hello')"}, {text:"Вывод: Hello — вывод в консоль"},

{code:true,value:"let x=5; let y=3; console.log(x*y);"}, {text:"Вывод: 15 — умножение"},

{code:true,value:"for(let i=0;i<3;i++){ console.log(i); }"}, {text:"Вывод: 0 1 2 — цикл for"},

{code:true,value:"function greet(name){ return 'Hi '+name; } console.log(greet('Alex'));"}, {text:"Вывод: Hi Alex — функция"},

{code:true,value:"console.log([1,2,3].map(n=>n*3));"}, {text:"Вывод: [3,6,9] — map"},

{text:"Рекомендуемые книги и ресурсы:\n• <a href='https://learn.javascript.ru/' target='_blank'>Современный учебник JS</a>\n• <a href='https://eloquentjavascript.net/' target='_blank'>Eloquent JavaScript</a>\n• <a href='https://developer.mozilla.org/ru/docs/Web/JavaScript/Guide' target='_blank'>MDN JavaScript Guide</a>"}
]
},

java:{
title:"☕ Java",
messages:[
{text:"Java — строго типизированный объектно-ориентированный язык. Используется в Android, корпоративных приложениях и серверной разработке. Код компилируется в байт-код JVM, что обеспечивает кроссплатформенность. Поддерживает многопоточность, наследование, интерфейсы. Фреймворки Spring, Hibernate ускоряют разработку. Java применяют для крупных систем, где надёжность и масштабируемость важны. Строгая типизация помогает избегать ошибок, делая код более безопасным и поддерживаемым."},

{code:true,value:"System.out.println(\"Hello\");"}, {text:"Вывод: Hello"},

{code:true,value:"int x=10; int y=5; System.out.println(x+y);"}, {text:"Вывод: 15 — сумма"},

{code:true,value:"for(int i=0;i<3;i++){ System.out.println(i); }"}, {text:"Вывод: 0 1 2 — цикл"},

{code:true,value:"String greet(String name){ return \"Hi \"+name; } System.out.println(greet(\"Alex\"));"}, {text:"Вывод: Hi Alex — функция"},

{code:true,value:"int[] nums={1,2,3}; for(int n:nums){ System.out.println(n*2); }"}, {text:"Вывод: 2 4 6 — удвоение массива"},

{text:"Рекомендуемые книги и ресурсы:\n• <a href='https://www.oreilly.com/library/view/head-first-java/9780596009205/' target='_blank'>Head First Java</a>\n• <a href='https://docs.oracle.com/javase/tutorial/' target='_blank'>Официальный Java Tutorial</a>\n• <a href='https://www.learnjavaonline.org/' target='_blank'>Learn Java Online</a>"}
]
},

c:{
title:"⚙ C",
messages:[
{text:"C — классический язык системного программирования. Используется для операционных систем, драйверов, встроенных систем и высокопроизводительных программ. Предоставляет прямой доступ к памяти через указатели и позволяет контролировать работу с памятью. Многие языки, включая C++, Java, Python, основаны на синтаксисе C. Изучение C помогает понять работу компьютера на низком уровне: память, стек, процессы. Язык компилируемый и эффективный, но требует аккуратности."},

{code:true,value:"printf(\"Hello\");"}, {text:"Вывод: Hello"},

{code:true,value:"int x=10,y=5; printf(\"%d\",x-y);"}, {text:"Вывод: 5 — вычитание"},

{code:true,value:"for(int i=0;i<3;i++){ printf(\"%d\\n\",i); }"}, {text:"Вывод: 0 1 2 — цикл for"},

{code:true,value:"int nums[]={1,2,3}; for(int i=0;i<3;i++) printf(\"%d \",nums[i]*3);"}, {text:"Вывод: 3 6 9 — умножение массива"},

{code:true,value:"char name[]=\"Alex\"; printf(\"Hi %s\",name);"}, {text:"Вывод: Hi Alex — строка"},

{text:"Рекомендуемые книги и ресурсы:\n• <a href='https://www.learn-c.org/' target='_blank'>Learn C</a>\n• <a href='https://www.tutorialspoint.com/cprogramming/' target='_blank'>TutorialsPoint C</a>\n• <a href='https://www.gnu.org/software/gnu-c-manual/' target='_blank'>GNU C Manual</a>"}
]
},

go:{
title:"🚀 Go",
messages:[
{text:"Go — компилируемый язык от Google. Подходит для серверов, микросервисов и облачных приложений. Прост в синтаксисе, производителен, поддерживает параллельное выполнение через горутины. Имеет структуры, интерфейсы, каналы. Популярен в DevOps, сетевых и инфраструктурных проектах. Минималистичный, безопасный и эффективный. Go компилируется быстро, легко тестируется и масштабируется. Идеален для команд, которым важна скорость разработки и поддержка крупных проектов."},

{code:true,value:"fmt.Println(\"Hello\")"}, {text:"Вывод: Hello"},

{code:true,value:"x:=10; y:=5; fmt.Println(x+y)"}, {text:"Вывод: 15 — сумма"},

{code:true,value:"for i:=0;i<3;i++{ fmt.Println(i) }"}, {text:"Вывод: 0 1 2 — цикл"},

{code:true,value:"func greet(name string) string { return \"Hi \"+name }\nfmt.Println(greet(\"Alex\"))"}, {text:"Вывод: Hi Alex — функция"},

{code:true,value:"nums:=[]int{1,2,3}\nfor _,n:=range nums{ fmt.Println(n*2) }"}, {text:"Вывод: 2 4 6 — удвоение массива"},

{text:"Рекомендуемые книги и ресурсы:\n• <a href='https://gobyexample.com/' target='_blank'>Go by Example</a>\n• <a href='https://tour.golang.org/welcome/1' target='_blank'>A Tour of Go</a>\n• <a href='https://golang.org/doc/' target='_blank'>Go Documentation</a>"}
]
}

};

function openChat(e,lang){
document.querySelectorAll('.chat-item').forEach(el=>el.classList.remove('active'));
e.currentTarget.classList.add('active');
document.getElementById("chat-title").innerText=content[lang].title;
const messagesDiv=document.getElementById("messages");
messagesDiv.innerHTML="";
content[lang].messages.forEach((msg,i)=>{
setTimeout(()=>{
const div=document.createElement("div");
div.className=msg.code?"message code":"message";
div.innerHTML=msg.value||msg.text;
messagesDiv.appendChild(div);
messagesDiv.scrollTop=messagesDiv.scrollHeight;
},i*200);
});
if(window.innerWidth<=768){document.getElementById("sidebar").classList.add("hidden");}
}

function goBack(){document.getElementById("sidebar").classList.remove("hidden");}
</script>
</body>
</html>
